name: Deploy to Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: app
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Verify dist output
        working-directory: app
        run: |
          echo "=== dist/ contents ==="
          ls -la dist/
          echo "=== dist/assets/ ==="
          ls -la dist/assets/ || echo "no assets dir"
          echo "=== Total size ==="
          du -sh dist/

      - name: Prepare Vercel prebuilt output
        working-directory: app
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/. .vercel/output/static/
          printf '{"version":3,"routes":[{"src":"^/assets/(.*)$","dest":"/assets/$1"},{"src":"/((?!api/).*)", "dest":"/index.html"}]}' > .vercel/output/config.json
          echo "=== .vercel/output/ contents ==="
          ls -la .vercel/output/
          echo "=== .vercel/output/static/ ==="
          ls -la .vercel/output/static/
          echo "=== Total prebuilt size ==="
          du -sh .vercel/output/

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Production
        if: github.ref == 'refs/heads/main'
        working-directory: app
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        working-directory: app
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
